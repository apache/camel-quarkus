# Watson Natural Language Understanding Configuration
# For JVM mode tests: use system properties -Dcamel.ibm.watson.serviceUrl=... -Dcamel.ibm.watson.apiKey=...
# For native mode tests: use environment variables CAMEL_IBM_WATSON_SERVICEURL=... CAMEL_IBM_WATSON_APIKEY=...
# When not provided, routes are not created and tests are skipped
camel.ibm.watson.serviceUrl=${CAMEL_IBM_WATSON_SERVICEURL:}
camel.ibm.watson.apiKey=${CAMEL_IBM_WATSON_APIKEY:}