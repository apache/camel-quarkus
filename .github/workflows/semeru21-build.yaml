name: Semeru JDK 21 Build

on:
  schedule:
    # Run every Saturday at 2 PM
    - cron:  '0 14 * * SAT'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semeru21-build:
    uses: ./.github/workflows/alternate-jdk-build.yaml
    with:
      jdk-version: '21'
      jdk-distribution: 'semeru'
