name: Camel Quarkus CI

on:
  push:
    branches:
      - main
      - camel-main
      - quarkus-main
      - "[0-9]+.[0-9]+.x"
    paths-ignore:
      - '**.adoc'
      - '**.md'
      - 'Jenkinsfile'
      - 'Jenkinsfile.*'
      - 'KEYS'
      - 'LICENSE.txt'
      - 'NOTICE.txt'
      - 'camel-quarkus-sbom/**'
      - '**/META-INF/quarkus-extension.yaml'
      - '.github/*.sh'
      - '.github/*.yaml'
      - '.github/*.yml'
      - '.github/workflows/assign-issue-milestone.yaml'
      - '.github/workflows/assign-wontfix-issue-milestone.yaml'
      - '.github/workflows/camel-master-cron.yaml'
      - '.github/workflows/check-dependency-convergence.yml'
      - '.github/workflows/alternate-jdk-build.yaml'
      - '.github/workflows/generate-sbom-main.yml'
      - '.github/workflows/jdk21-build.yaml'
      - '.github/workflows/jdk25-build.yaml'
      - '.github/workflows/semeru17-build.yaml'
      - '.github/workflows/semeru21-build.yaml'
      - '.github/workflows/label-issue.yaml'
      - '.github/workflows/pr-validate.yml'
      - '.github/workflows/quarkus-master-cron.yaml'
      - '.github/workflows/synchronize-dependabot-branch.yaml'
      - '.github/workflows/pr-doc-validation.yaml'
      - 'docs/antora.yml'
      - 'release-utils/**'
  pull_request:
    branches:
      - main
      - camel-main
      - quarkus-main
      - "[0-9]+.[0-9]+.x"
    paths-ignore:
      - '**.adoc'
      - '**.md'
      - 'Jenkinsfile'
      - 'Jenkinsfile.*'
      - 'KEYS'
      - 'LICENSE.txt'
      - 'NOTICE.txt'
      - 'camel-quarkus-sbom/**'
      - '**/META-INF/quarkus-extension.yaml'
      - '.github/*.sh'
      - '.github/*.yaml'
      - '.github/*.yml'
      - '.github/workflows/assign-issue-milestone.yaml'
      - '.github/workflows/assign-wontfix-issue-milestone.yaml'
      - '.github/workflows/alternate-jdk-build.yaml'
      - '.github/workflows/camel-master-cron.yaml'
      - '.github/workflows/check-dependency-convergence.yml'
      - '.github/workflows/generate-sbom-main.yml'
      - '.github/workflows/jdk21-build.yaml'
      - '.github/workflows/jdk25-build.yaml'
      - '.github/workflows/label-issue.yaml'
      - '.github/workflows/semeru17-build.yaml'
      - '.github/workflows/semeru21-build.yaml'
      - '.github/workflows/pr-validate.yml'
      - '.github/workflows/quarkus-lts-ci-build.yaml'
      - '.github/workflows/quarkus-master-cron.yaml'
      - '.github/workflows/synchronize-dependabot-branch.yaml'
      - '.github/workflows/pr-doc-validation.yaml'
      - 'docs/antora.yml'
      - 'release-utils/**'


permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  LANG: en_US.UTF-8
  MAVEN_OPTS: -Xmx3000m
  CQ_MAVEN_ARGS: -V -ntp -e -Daether.connector.http.connectionMaxTtl=120
  TESTCONTAINERS_RYUK_DISABLED: true
  CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' && github.head_ref || '' }}
  # Scalpel configuration (defaults for all jobs; initial-mvn-install overrides SCALPEL_FULL_BUILD_TRIGGERS).
  # Broad extensions-core/** trigger here is intentional: functional-extension-tests uses trim mode,
  # which actively excludes modules from the build, so any extensions-core change should run full tests.
  SCALPEL_FULL_BUILD_TRIGGERS: "-Dscalpel.fullBuildTriggers=poms/build-parent/**,poms/build-parent-it/**,extensions-core/**,.mvn/**,.github/workflows/ci-build.yaml"
  SCALPEL_EXCLUDE_PATHS: "-Dscalpel.excludePaths=**.adoc,**.md,docs/**,Jenkinsfile*,LICENSE.txt,NOTICE.txt,KEYS,camel-quarkus-sbom/**,.github/*.sh"
  CQ_MAVEN_SKIP_CHECKS: "-Dformatter.skip -Dimpsort.skip -Denforcer.skip -Dcamel-quarkus.update-extension-doc-page.skip"

jobs:
  pre-build-checks:
    if: github.repository == 'apache/camel-quarkus'
    runs-on: ubuntu-latest
    outputs:
      continue-build: ${{ steps.pre-build-checks.outputs.continue-build }}
      run-checks: ${{ steps.init.outputs.run-checks }}
    steps:
      - name: Initialize
        id: init
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.pull_request.user.login }}" == "dependabot[bot]" ]]; then
            echo "run-checks=true" >> $GITHUB_OUTPUT
          else
            echo "run-checks=false" >> $GITHUB_OUTPUT
          fi
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        if: steps.init.outputs.run-checks == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.init.outputs.run-checks == 'true'
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - name: Setup Maven Cache
        if: steps.init.outputs.run-checks == 'true'
        uses: ./.github/actions/setup-maven-cache
        with:
          maven-properties: |
            jira-rest-client.version
            quarkiverse-cxf.version
      - name: Pre build checks
        id: pre-build-checks
        run: |
          if [[ "${{ steps.init.outputs.run-checks }}" == "true" ]]; then
            ./mvnw cq:sync-versions -N ${CQ_MAVEN_ARGS}
            ./mvnw clean install -pl poms/bom -am -Dcq.flatten-bom.format --fail-never ${CQ_MAVEN_ARGS}
            ./mvnw clean install -f poms/bom ${CQ_MAVEN_ARGS}
            ./mvnw clean validate -pl docs ${CQ_MAVEN_ARGS}

            if [[ -z "$(git status --porcelain)" ]]; then
              echo "continue-build=true" >> $GITHUB_OUTPUT
            else
              mkdir ./dependabot-pr
              echo ${{ github.head_ref }} > ./dependabot-pr/BRANCH_REF
              echo ${{ github.event.pull_request.head.sha }} > ./dependabot-pr/PR_HEAD_SHA
              echo "$GITHUB_REF" | awk -F / '{print $3}' >  ./dependabot-pr/PR_NUMBER
              echo ${{ github.event.pull_request.user.login }} > ./dependabot-pr/PR_AUTHOR
              git diff -p --binary > ./dependabot-pr/changes.patch

              echo "continue-build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "continue-build=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload dependabot changeset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.pre-build-checks.outputs.continue-build == 'false'
        with:
          name: dependabot-pr-changeset
          path: dependabot-pr/
          retention-days: 1

  initial-mvn-install:
    if: needs.pre-build-checks.outputs.continue-build == 'true'
    runs-on: ubuntu-latest
    needs: pre-build-checks
    outputs:
      # Miscellaneous job outputs. Keep sorted alphabetically.
      cache-key: ${{ steps.maven-cache.outputs.cache-key }}
      # Incremental build job outputs. Keep sorted alphabetically.
      examples-matrix: ${{ steps.set-examples-matrix.outputs.examples-matrix }}
      integration-tests-jvm-modules: ${{ steps.process-incremental.outputs.integration-tests-jvm-modules || '' }}
      integration-tests-matrix: ${{ steps.process-incremental.outputs.use-incremental == 'true' && steps.process-incremental.outputs.integration-tests-matrix || steps.set-native-matrix-full.outputs.matrix || '{"include":[]}' }}
      integration-tests-modules: ${{ steps.incremental-build.outputs.integration-tests-modules }}
      run-catalog-tests: ${{ steps.process-incremental.outputs.run-catalog-tests }}
      run-examples: ${{ steps.process-incremental.outputs.run-examples }}
      run-extensions-core-tests: ${{ steps.process-incremental.outputs.run-extensions-core-tests }}
      run-extensions-tests: ${{ steps.process-incremental.outputs.run-extensions-tests }}
      run-integration-tests-jvm: ${{ steps.process-incremental.outputs.run-integration-tests-jvm }}
      run-test-framework-tests: ${{ steps.process-incremental.outputs.run-test-framework-tests }}
      run-tooling-tests: ${{ steps.process-incremental.outputs.run-tooling-tests }}
    env:
      MAVEN_OPTS: -Xmx4600m
      SCALPEL_ENABLED: "-Dscalpel.enabled=true"
      SCALPEL_FULL_BUILD_TRIGGERS: "-Dscalpel.fullBuildTriggers=poms/build-parent/**,poms/build-parent-it/**,extensions-core/core/**,.mvn/**,.github/workflows/ci-build.yaml"
      SCALPEL_EXCLUDE_PATHS: "-Dscalpel.excludePaths=docs/**"
    steps:
      - name: Check free space on disk
        run: |
          df -h /
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Clone Camel
        if: github.ref == 'refs/heads/camel-main' || github.base_ref == 'camel-main'
        run: |
          cd ../
          git clone --depth 1 --branch main https://github.com/apache/camel.git
          cd camel
          echo "Current Camel commit:" $(git rev-parse HEAD)
      - name: Build Quarkus
        if: github.ref == 'refs/heads/quarkus-main' || github.base_ref == 'quarkus-main'
        run: |
          git clone --depth 1 --branch main https://github.com/quarkusio/quarkus.git \
            && cd quarkus \
            && echo "Current Quarkus commit:" $(git rev-parse HEAD) \
            && sed -i '/<module>integration-tests<\/module>/d' pom.xml \
            && ./mvnw ${CQ_MAVEN_ARGS} clean install -Dquickly -Prelocations -T1C
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - name: Setup Maven Cache
        id: maven-cache
        uses: ./.github/actions/setup-maven-cache
      - name: Build Camel
        if: github.ref == 'refs/heads/camel-main' || github.base_ref == 'camel-main'
        run: |
          cd ../camel
          ./mvnw ${CQ_MAVEN_ARGS} clean install -Dquickly -T1C
      - name: Detect PR Incremental Build
        id: detect-incremental
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci/disable-incremental')
        run: |
          echo "incremental-build=true" >> $GITHUB_OUTPUT
      - name: Update extension metadata
        run: |
          ./mvnw -N cq:update-quarkus-metadata ${CQ_MAVEN_ARGS}
      - name: mvn clean install -DskipTests
        run: |
          eval ./mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} -T1C clean install -DskipTests -Dquarkus.build.skip -Pformat
      - name: Scalpel Analysis
        id: scalpel-analysis
        if: steps.detect-incremental.outputs.incremental-build == 'true'
        continue-on-error: true
        run: |
          ./mvnw validate -Dquickly \
            ${SCALPEL_ENABLED} \
            -Dscalpel.mode=report \
            ${SCALPEL_FULL_BUILD_TRIGGERS} \
            ${SCALPEL_EXCLUDE_PATHS} \
            ${CQ_MAVEN_ARGS}

          if [ -f target/scalpel-report.json ]; then
            echo "Scalpel report generated successfully"
            cat target/scalpel-report.json | jq '{fullBuildTriggered, triggerFile, affectedModulesCount: (.affectedModules | length)}'
          else
            echo "Scalpel report not found"
            exit 1
          fi
      - name: Warn on Scalpel failure
        if: steps.scalpel-analysis.outcome == 'failure'
        run: echo "::warning::Scalpel analysis failed, falling back to full build"
      - name: Detect Changed Container Properties
        id: detect-container-props
        if: steps.detect-incremental.outputs.incremental-build == 'true' && steps.scalpel-analysis.outcome != 'failure'
        run: |
          # NOTE: We do this manual checking since the container image properties are not linked to any other pom.xml in the project.
          # They are queried dynamically via Java code. This logic enables pom.xml to be removed from Scalpel full build triggers.

          CHANGED_CONTAINER_PROPS=""
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -n "$BASE_SHA" ] && git diff "$BASE_SHA" -- pom.xml | grep -qE '[+-].*\.container\.image>'; then
            CHANGED_CONTAINER_PROPS=$(git diff "$BASE_SHA" -- pom.xml \
              | grep -E '^\+.*\.container\.image>' \
              | sed -E 's/.*<([^<\/]+\.container\.image)>.*/\1/' \
              | paste -sd,)
            echo "Changed container properties: $CHANGED_CONTAINER_PROPS"
          fi
          echo "props=$CHANGED_CONTAINER_PROPS" >> $GITHUB_OUTPUT
      - name: Incremental Build Analysis
        id: incremental-build
        if: steps.detect-incremental.outputs.incremental-build == 'true' && steps.scalpel-analysis.outcome != 'failure'
        continue-on-error: true
        run: |
          # Run unified incremental build analysis
          # All directory patterns are explicitly configured here for visibility and maintainability
          # Extract project version dynamically to avoid hardcoding
          PROJECT_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -N)
          echo "Using camel-quarkus-maven-plugin version: $PROJECT_VERSION"

          CONTAINER_PROPS="${{ steps.detect-container-props.outputs.props }}"

          ./mvnw org.apache.camel.quarkus:camel-quarkus-maven-plugin:${PROJECT_VERSION}:incremental-build \
            -Dcq.action=analyze \
            -Dcq.useIncrementalBuild=true \
            -Dcq.extensionDirs="extensions/,extensions-jvm/,extensions-core/" \
            -Dcq.integrationTestDirs="integration-tests/,integration-tests-jvm/" \
            -Dcq.nativeTestsPrefix="integration-tests/" \
            -Dcq.jvmTestsPrefix="integration-tests-jvm/" \
            -Dcq.integrationTestGroupsPrefix="integration-test-groups/" \
            -Dcq.functionalScopeDirs="extensions-core/:runExtensionsCoreTests,extensions/:runExtensionsTests,test-framework/:runTestFrameworkTests,tooling/:runToolingTests,catalog/:runCatalogTests" \
            ${CONTAINER_PROPS:+-Dcq.changedContainerProperties="$CONTAINER_PROPS"} \
            -N ${CQ_MAVEN_ARGS}

          if [ -f target/incremental-build.json ]; then
            echo "Incremental build analysis complete"
            cat target/incremental-build.json

            # Output entire JSON as single output (compact for GitHub Actions)
            echo "data=$(cat target/incremental-build.json | jq -c '.')" >> $GITHUB_OUTPUT

            # Only set integration-tests-modules for actual incremental builds.
            # For full builds (incrementalBuild=false), leave it empty so downstream jobs run all modules.
            IS_INCREMENTAL=$(cat target/incremental-build.json | jq -r '.incrementalBuild // false')
            if [ "$IS_INCREMENTAL" == "true" ]; then
              INTEGRATION_TESTS_MODULES=$(cat target/incremental-build.json | jq -c '{modules: .affectedModules, modulesCsv: (.affectedModules | join(",")), fullBuild: false, totalModules: .affectedModulesCount}')
              echo "integration-tests-modules=$INTEGRATION_TESTS_MODULES" >> $GITHUB_OUTPUT
            fi
          else
            echo "Incremental build analysis failed - falling back to full build"
            # Output empty JSON structure for fallback
            echo "data={\"incrementalBuild\":false}" >> $GITHUB_OUTPUT
          fi
      - name: Process Incremental Build Data
        id: process-incremental
        run: |
          # Parse JSON and resolve all outputs.
          # For full builds, all run-* flags resolve to true so job outputs are simple pass-throughs.
          INCREMENTAL=false
          if [ -f target/incremental-build.json ]; then
            DATA=$(cat target/incremental-build.json)
            INCREMENTAL=$(echo "$DATA" | jq -r '.incrementalBuild // false')
          fi

          echo "use-incremental=$INCREMENTAL" >> $GITHUB_OUTPUT

          if [ "$INCREMENTAL" == "true" ]; then
            echo "Incremental build will be used"
            echo "integration-tests-matrix=$(echo "$DATA" | jq -c '.nativeTestMatrix')" >> $GITHUB_OUTPUT
            echo "run-integration-tests-jvm=$(echo "$DATA" | jq -r '.integrationTestsJvm.runTests')" >> $GITHUB_OUTPUT
            echo "integration-tests-jvm-modules=$(echo "$DATA" | jq -r '.integrationTestsJvm.modules')" >> $GITHUB_OUTPUT
            echo "run-extensions-core-tests=$(echo "$DATA" | jq -r '.functionalTestScope.runExtensionsCoreTests')" >> $GITHUB_OUTPUT
            echo "run-extensions-tests=$(echo "$DATA" | jq -r '.functionalTestScope.runExtensionsTests')" >> $GITHUB_OUTPUT
            echo "run-examples=$(echo "$DATA" | jq -r '.runExamples')" >> $GITHUB_OUTPUT
            echo "run-test-framework-tests=$(echo "$DATA" | jq -r '.functionalTestScope.runTestFrameworkTests')" >> $GITHUB_OUTPUT
            echo "run-tooling-tests=$(echo "$DATA" | jq -r '.functionalTestScope.runToolingTests')" >> $GITHUB_OUTPUT
            echo "run-catalog-tests=$(echo "$DATA" | jq -r '.functionalTestScope.runCatalogTests')" >> $GITHUB_OUTPUT
          else
            echo "Full build will be used"
            echo "run-integration-tests-jvm=true" >> $GITHUB_OUTPUT
            echo "run-extensions-core-tests=true" >> $GITHUB_OUTPUT
            echo "run-extensions-tests=true" >> $GITHUB_OUTPUT
            echo "run-examples=true" >> $GITHUB_OUTPUT
            echo "run-test-framework-tests=true" >> $GITHUB_OUTPUT
            echo "run-tooling-tests=true" >> $GITHUB_OUTPUT
            echo "run-catalog-tests=true" >> $GITHUB_OUTPUT
          fi
      - name: Sync Maven properties
        run: |
          ./mvnw cq:sync-versions ${CQ_MAVEN_ARGS} -N
      - name: Fail if there are uncommitted changes
        shell: bash
        run: |
          [[ -z $(git status --porcelain | grep -v antora.yml) ]] || { echo 'There are uncommitted changes'; git status; git diff; exit 1; }
      - name: Tar Maven Repo
        shell: bash
        run: |
          tar -I 'zstd -T0' -cf ${{ runner.temp }}/maven-repo.tar.zst -C ~ .m2/repository
          ls -lh ${{ runner.temp }}/maven-repo.tar.zst
          df -h /
      - name: Persist Maven Repo
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maven-repo
          path: ${{ runner.temp }}/maven-repo.tar.zst
          retention-days: 1
      - name: Save Maven Cache
        uses: ./.github/actions/setup-maven-cache
        if: always()
        with:
          action: save
          cache-key: ${{ steps.maven-cache.outputs.cache-key }}
      - name: Setup Native Test Matrix (Full Build)
        id: set-native-matrix-full
        if: steps.process-incremental.outputs.use-incremental != 'true'
        run: |
          echo "Using all test categories (full build)"
          CATEGORIES=$(yq -M -N -I 0 -o=json e 'keys' tooling/scripts/test-categories.yaml | tr '"' "'")
          MATRIX_FULL="{'category': ${CATEGORIES}}"

          # Validate matrix size (convert single quotes to double quotes for jq)
          MATRIX_SIZE=$(echo "$MATRIX_FULL" | sed "s/'/\"/g" | jq '.category | length')
          echo "Native tests matrix size: $MATRIX_SIZE jobs (full build)"
          if [ "$MATRIX_SIZE" -gt 20 ]; then
            echo "ERROR: Native tests matrix size ($MATRIX_SIZE) exceeds maximum expected (20)"
            echo "Matrix content: $MATRIX_FULL"
            exit 1
          fi

          echo "matrix=$MATRIX_FULL" >> $GITHUB_OUTPUT
      - name: Setup Examples Matrix
        id: set-examples-matrix
        run: |
          EXAMPLES_BRANCH="camel-quarkus-main"
          if [[ ${GITHUB_REF_NAME} =~ [0-9]+.[0-9]+.x ]]; then
              EXAMPLES_BRANCH=${GITHUB_REF_NAME}
          elif [[ ${GITHUB_BASE_REF} =~ [0-9]+.[0-9]+.x ]]; then
              EXAMPLES_BRANCH=${GITHUB_BASE_REF}
          fi

          sudo apt install groovy -y --no-install-recommends
          EXAMPLES_MATRIX=$(groovy -DEXAMPLES_BRANCH=${EXAMPLES_BRANCH} tooling/scripts/generate-examples-matrix.groovy)
          echo "examples-matrix=${EXAMPLES_MATRIX}" >> $GITHUB_OUTPUT

  native-tests:
    name: Native Tests - ${{ matrix.name || matrix.category }}
    needs: initial-mvn-install
    runs-on: ubuntu-latest
    if: |
      (github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'JVM'))
      && (fromJson(needs.initial-mvn-install.outputs.integration-tests-matrix).include[0] != null || fromJson(needs.initial-mvn-install.outputs.integration-tests-matrix).category[0] != null)
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.initial-mvn-install.outputs.integration-tests-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - name: Reclaim Disk Space
        run: .github/reclaim-disk-space.sh
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Maven Cache
        uses: ./.github/actions/setup-maven-cache
        with:
          cache-key: ${{ needs.initial-mvn-install.outputs.cache-key }}
          download-maven-repo: 'true'
      - name: Integration Tests
        run: |
          # Check if this is incremental build (modules) or full build (category)
          if [ -n "${{ matrix.modules }}" ]; then
            echo "Incremental build - running modules: ${{ matrix.modules }}"
            # Split comma-separated modules
            IFS=',' read -ra MODULE_LIST <<< "${{ matrix.modules }}"
            for MODULE_NAME in "${MODULE_LIST[@]}"; do
              MODULE="integration-tests/${MODULE_NAME}"

              if [[ "x$(./mvnw org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=ci.native.tests.skip -DforceStdout -q -f ${MODULE})" == "xtrue" ]]; then
                JVM_MODULES+=("${MODULE}")
              else
                NATIVE_MODULES+=("${MODULE}")
              fi
            done
          else
            echo "Full build - running category: ${{ matrix.category }}"
            # Original category-based logic
            for MODULE in $(yq -M -N e ".${{ matrix.category }}" tooling/scripts/test-categories.yaml | grep -vE '^\s*#' | cut -f2 -d' '); do
              if [[ "${MODULE}" == "null" ]]; then
                continue
              fi

              MODULE="integration-tests/$(echo ${MODULE} | sed 's/^[ \t]*//;s/[ \t]*$//')"

              if [[ "x$(./mvnw org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=ci.native.tests.skip -DforceStdout -q -f ${MODULE})" == "xtrue" ]]; then
                JVM_MODULES+=("${MODULE}")
              else
                NATIVE_MODULES+=("${MODULE}")
              fi
            done
          fi

          if [[ ${#JVM_MODULES[@]} -eq 0 ]] && [[ ${#NATIVE_MODULES[@]} -eq 0 ]]; then
            echo "No test modules were found"
            exit 1
          fi

          IFS=,
          if [[ ${JVM_MODULES[@]} ]]; then
            eval ./mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} clean test \
              ${CQ_MAVEN_SKIP_CHECKS} \
              -Pdocker,ci \
              -pl "${JVM_MODULES[*]}"
          fi

          if [[ ${NATIVE_MODULES[@]} ]]; then
            eval ./mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} clean verify \
              ${CQ_MAVEN_SKIP_CHECKS} \
              -Dquarkus.native.builder-image.pull=missing \
              -Pnative,docker,ci \
              --fail-at-end \
              -pl "${NATIVE_MODULES[*]}"
          fi
      - name: Report test failures
        uses: ./.github/actions/test-summary-report
        if: ${{ failure() }}
        with:
          test-report-xml-base-dir: integration-tests
      - name: Fail if there are uncommitted changes
        shell: bash
        run: |
          [[ -z $(git status --porcelain) ]] || { echo 'There are uncommitted changes'; git status; git diff; exit 1; }

