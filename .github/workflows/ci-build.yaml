  integration-tests-alternative-platform:
    runs-on: ${{ matrix.os }}
    needs: initial-mvn-install
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-latest' ]
    if: |
      (github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'JVM'))
      && (needs.initial-mvn-install.outputs.integration-tests-modules == '' || fromJson(needs.initial-mvn-install.outputs.integration-tests-modules).totalModules > 0)
    env:
      MAVEN_OPTS: -Xmx3000m -Xms3000m
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Maven Cache
        uses: ./.github/actions/setup-maven-cache
        with:
          cache-key: ${{ needs.initial-mvn-install.outputs.cache-key }}
          download-maven-repo: 'true'
      - name: cd integration-tests && mvn clean verify
        shell: bash
        run: |
          cd integration-tests
          if [ -n "${{ needs.initial-mvn-install.outputs.integration-tests-modules }}" ]; then
            # Incremental build - use affected modules from filtered matrix
            AFFECTED_MODULES=$(echo '${{ needs.initial-mvn-install.outputs.integration-tests-modules }}' | jq -r '.modulesCsv')
            echo "Running incremental build with affected modules: $AFFECTED_MODULES"
            ../mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} \
              -pl "$AFFECTED_MODULES" \
              -Dskip-testcontainers-tests ${CQ_MAVEN_SKIP_CHECKS} \
              --fail-at-end \
              clean verify
          else
            # Full build - run all modules
            echo "Running full build - all modules"
            ../mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} \
              -Dskip-testcontainers-tests ${CQ_MAVEN_SKIP_CHECKS} \
              --fail-at-end \
              clean verify
          fi
      - name: Report test failures
        uses: ./.github/actions/test-summary-report
        if: ${{ failure() }}
        with:
          test-report-xml-base-dir: integration-tests

  examples-tests:
    name: Examples Tests - ${{matrix.name}}
    needs: initial-mvn-install
    runs-on: ubuntu-latest
    if: |
      (github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'JVM'))
      && needs.initial-mvn-install.outputs.run-examples == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.initial-mvn-install.outputs.examples-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Maven Cache
        uses: ./.github/actions/setup-maven-cache
        with:
          cache-key: ${{ needs.initial-mvn-install.outputs.cache-key }}
          download-maven-repo: 'true'
      - name: set CQ_VERSION
        run: echo "CQ_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout -N)" >> $GITHUB_ENV
      - name: clone and verify examples
        env:
          EXAMPLE_MODULES: ${{matrix.examples}}
        shell: '/usr/bin/bash {0}'
        run: |
          EXAMPLES_BRANCH="camel-quarkus-main"

          if [[ ${GITHUB_REF_NAME} =~ [0-9]+.[0-9]+.x ]]; then
              EXAMPLES_BRANCH=${GITHUB_REF_NAME}
          elif [[ ${GITHUB_BASE_REF} =~ [0-9]+.[0-9]+.x ]]; then
              EXAMPLES_BRANCH=${GITHUB_BASE_REF}
          fi

          git clone --depth 1 --branch ${EXAMPLES_BRANCH} https://github.com/apache/camel-quarkus-examples.git \
            && cd camel-quarkus-examples \
            && echo "Current Examples commit:" $(git rev-parse HEAD) \
            && ./mvnw ${CQ_MAVEN_ARGS} ${BRANCH_OPTIONS} org.l2x6.cq:cq-maven-plugin:2.10.0:examples-set-platform -Dcq.camel-quarkus.version=${CQ_VERSION}

          # Filter examples for incremental builds
          MODULES_TO_BUILD="${EXAMPLE_MODULES//,/ }"

          if [ -n "${{ needs.initial-mvn-install.outputs.integration-tests-modules }}" ]; then
            echo "Incremental build detected - filtering examples based on affected extensions"

            # Get affected modules from filtered matrix
            # Get affected modules as space-separated list for iteration
            AFFECTED_MODULES=$(echo '${{ needs.initial-mvn-install.outputs.integration-tests-modules }}' | jq -r '.modulesCsv' | tr ',' ' ')
            echo "Affected modules: $AFFECTED_MODULES"

            # Check if extensions-core/core is affected (build all examples if so)
            if echo "$AFFECTED_MODULES" | grep -q "^core$"; then
              echo "Core extension affected - building all examples"
            else
              # Filter examples based on dependency analysis
              echo "Affected modules for filtering: $AFFECTED_MODULES"
              FILTERED_MODULES=()

              for MODULE in ${EXAMPLE_MODULES//,/ }; do
                echo "Analyzing dependencies for example: $MODULE"
                cd ${MODULE}

                # Use quarkus:dependency-list which works per-module (root pom.xml is just an aggregator)
                echo "  Running: ../mvnw quarkus:dependency-list -DoutputFile=target/deps.txt -q"
                ../mvnw ${CQ_MAVEN_ARGS} quarkus:dependency-list -DoutputFile=target/deps.txt -q 2>&1 || true

                if [ -f target/deps.txt ]; then
                  echo "  ✓ deps.txt created ($(wc -l < target/deps.txt) lines)"
                  # Check if any affected extension appears in dependencies
                  SHOULD_BUILD=false
                  for AFFECTED in $AFFECTED_MODULES; do
                    # Convert module name to artifact ID (e.g., "box" -> "camel-quarkus-box")
                    ARTIFACT_ID="camel-quarkus-${AFFECTED}"
                    # Use word boundary matching to avoid partial matches (e.g., box matching dropbox)
                    if grep -qw "$ARTIFACT_ID" target/deps.txt; then
                      echo "  → Depends on affected extension: $ARTIFACT_ID"
                      SHOULD_BUILD=true
                      break
                    fi
                  done

                  if [ "$SHOULD_BUILD" == "true" ]; then
                    FILTERED_MODULES+=("$MODULE")
                  else
                    echo "  → No affected dependencies - skipping"
                  fi
                else
                  echo "  → Could not determine dependencies - including for safety"
                  FILTERED_MODULES+=("$MODULE")
                fi

                cd -
              done

              if [ ${#FILTERED_MODULES[@]} -eq 0 ]; then
                echo "No examples depend on affected extensions - skipping all"
                exit 0
              fi

              MODULES_TO_BUILD="${FILTERED_MODULES[@]}"
              echo "Filtered examples to build: $MODULES_TO_BUILD"
            fi
          fi

          BUILD_FAILURES=()

          for MODULE in $MODULES_TO_BUILD; do
            echo "Building example: $MODULE"
            cd ${MODULE}

            ../mvnw ${CQ_MAVEN_ARGS} clean verify \
              ${CQ_MAVEN_SKIP_CHECKS} \
              -Dquarkus.native.builder-image.pull=missing \
              -Pnative,docker,ci

            if [[ $? -ne 0 ]]; then
              BUILD_FAILURES[${#BUILD_FAILURES[@]}]=${MODULE}
            fi

            cd -
          done

          if [[ ${#BUILD_FAILURES[@]} -gt 0 ]]; then
            echo -e "\nBuild errors were encountered in the following projects:\n"
            for FAILURE in ${BUILD_FAILURES[@]}; do
                echo "* ${FAILURE}"
            done
            echo -e "\nCheck build logs for further information."
            exit 1
          fi
      - name: Report test failures
        uses: ./.github/actions/test-summary-report
        if: ${{ failure() }}
