name: 'Setup Maven Cache'
description: 'Downloads Maven repository artifact and restores Atlassian dependencies cache'
inputs:
  atlassian-version:
    description: 'Version of Atlassian dependencies for cache key'
    required: true

runs:
  using: "composite"
  steps:
    - name: Restore Atlassian Maven Cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.4.0
      with:
        path: |
          ~/.m2/repository/com/atlassian
          ~/.m2/repository/io/atlassian
        key: atlassian-maven-${{ inputs.atlassian-version }}
    - name: Download Maven Repo
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: maven-repo
        path: ..
    - name: Extract Maven Repo
      shell: bash
      run: |
        df -h /
        tar -I 'zstd -d' -xf ../maven-repo.tar.zst -C ~
        rm -f ../maven-repo.tar.zst
        df -h /
